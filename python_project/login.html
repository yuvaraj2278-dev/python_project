<!DOCTYPE html>
<html>
<head>
    <title>Login - Shopper AI</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
/* =========================================
   🚀 MODERN TECH LOGIN / SIGNUP TOGGLE UI
============================================ */

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #0a0f1f, #111827, #1e293b);
    background-size: 300% 300%;
    animation: softGlow 15s ease infinite;
}

@keyframes softGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.login-container {
    width: 380px;
    padding: 35px;
    border-radius: 20px;
    background: rgba(17,24,39,0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.05);

    box-shadow:
        0 12px 30px rgba(0,0,0,0.5),
        0 0 30px rgba(59,130,246,0.05);

    text-align: center;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h2 {
    color: #60a5fa;
    margin-bottom: 10px;
}

p {
    color: #cbd5e1;
    margin-bottom: 20px;
}

/* TOGGLE BUTTONS */
.toggle-buttons {
    display: flex;
    margin-bottom: 20px;
    background: #1f2937;
    border-radius: 12px;
    overflow: hidden;
}

.toggle-buttons button {
    flex: 1;
    padding: 12px;
    border: none;
    background: transparent;
    color: #cbd5e1;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.toggle-buttons button.active {
    background: #2563eb;
    color: white;
}

/* INPUTS */
input {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border: none;
    border-radius: 10px;
    outline: none;

    background: #1f2937;
    color: white;
    font-size: 16px;

    border: 1px solid rgba(255,255,255,0.05);
    box-sizing: border-box;
}

input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 8px rgba(59,130,246,0.3);
}

/* MAIN ACTION BUTTON */
.action-btn {
    width: 100%;
    padding: 14px;
    margin-top: 15px;

    border: none;
    border-radius: 10px;

    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;

    font-size: 16px;
    font-weight: bold;
    cursor: pointer;

    transition: all 0.3s ease;
}

.action-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px rgba(37,99,235,0.4);
}
    </style>
</head>

<body>

<div class="login-container">

    <h2>🔐 Shopper AI</h2>
    <p id="formTitle">Login to continue</p>

    <!-- TOGGLE -->
    <div class="toggle-buttons">
        <button id="loginTab" class="active" onclick="switchMode('login')">Login</button>
        <button id="signupTab" onclick="switchMode('signup')">Sign Up</button>
    </div>

    <!-- FORM -->
    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button class="action-btn" id="actionBtn" onclick="login()">Login</button>

</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyA9CXDiGXm1-P86mn-2qrVeAAV6GlKuJXI",
    authDomain: "shopper-ai-ff808.firebaseapp.com",
    projectId: "shopper-ai-ff808",
    storageBucket: "shopper-ai-ff808.firebasestorage.app",
    messagingSenderId: "461841307458",
    appId: "1:461841307458:web:5c4ecd59c170dd3bfadadb",
    measurementId: "G-N0KDSVCNB4"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let currentMode = "login";

// Switch Login / Signup
function switchMode(mode) {
    currentMode = mode;

    const loginTab = document.getElementById("loginTab");
    const signupTab = document.getElementById("signupTab");
    const formTitle = document.getElementById("formTitle");
    const actionBtn = document.getElementById("actionBtn");

    if (mode === "login") {
        loginTab.classList.add("active");
        signupTab.classList.remove("active");
        formTitle.innerText = "Login to continue";
        actionBtn.innerText = "Login";
        actionBtn.onclick = login;
    } else {
        signupTab.classList.add("active");
        loginTab.classList.remove("active");
        formTitle.innerText = "Create your account";
        actionBtn.innerText = "Sign Up";
        actionBtn.onclick = signup;
    }
}

// Login
function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
        .then(() => {
            alert("✅ Login Successful");
            window.location.href = "dashboard.html";
        })
        .catch(err => alert("❌ " + err.message));
}

// Signup
function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
            alert("✅ Account Created Successfully");
            switchMode("login");
        })
        .catch(err => alert("❌ " + err.message));
}

// Auto Redirect
auth.onAuthStateChanged(user => {
    if (user) {
        window.location.href = "dashboard.html";
    }
});
</script>

</body>
</html>
